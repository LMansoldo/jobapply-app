  # ─── VOUCHERS ─────────────────────────────────────────────────────────────

  /vouchers:
    post:
      tags: [Vouchers]
      summary: Create a voucher
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, expires_at, discount_percentage, access_type]
              properties:
                code:
                  type: string
                  example: PROMO2026
                name:
                  type: string
                  example: Launch Promotion
                source_url:
                  type: string
                  example: https://partner.com
                expires_at:
                  type: string
                  format: date-time
                  example: '2026-12-31T23:59:59Z'
                discount_percentage:
                  type: number
                  example: 50
                access_type:
                  type: string
                  example: premium
      responses:
        '201':
          description: Voucher created
          content:
            application/json:
              schema:
                type: object
                properties:
                  voucher:
                    $ref: '#/components/schemas/Voucher'
        '400':
          description: Required fields missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Voucher code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Vouchers]
      summary: List all vouchers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Voucher list
          content:
            application/json:
              schema:
                type: object
                properties:
                  vouchers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Voucher'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vouchers/redeem:
    post:
      tags: [Vouchers]
      summary: Redeem a voucher (updates user access_type)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: PROMO2026
      responses:
        '200':
          description: Voucher redeemed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  access_type:
                    type: string
                  discount_percentage:
                    type: number
                  expires_at:
                    type: string
                    format: date-time
        '400':
          description: code is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Voucher or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Voucher is inactive or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vouchers/{code}:
    get:
      tags: [Vouchers]
      summary: Get voucher by code
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: PROMO2026
      responses:
        '200':
          description: Voucher found
          content:
